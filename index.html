<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Θαλασσινή Παρέα</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #0a2540, #1e6091);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      font-weight: 300;
      opacity: 0.9;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .wave {
      font-size: 2.5rem;
      margin-bottom: 20px;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .email-box {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    input[type="email"] {
      padding: 10px;
      border-radius: 25px;
      border: none;
      width: 60%;
    }

    button {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background-color: #00b4d8;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0077b6;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }

    .countdown-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px 10px;
      min-width: 80px;
      backdrop-filter: blur(5px);
    }

    .countdown-item .number {
      font-size: 2.5rem;
      font-weight: 600;
      display: block;
      line-height: 1.2;
    }

    .countdown-item .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wave">⚓ 🌊 🚢</div>
    <h1>Θαλασσινή Παρέα</h1>
    <h2>Έρχεται Σύντομα</h2>
    <p>Το απόλυτο portal για λάτρεις πλοίων και θαλασσών ετοιμάζεται να σαλπάρει. Μπες στην παρέα και μείνε συντονισμένος!</p>

<div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="number" id="days">00</span>
        <span class="label">Ημέρες</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="hours">00</span>
        <span class="label">Ώρες</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="minutes">00</span>
        <span class="label">Λεπτά</span>
      </div>
      <div class="countdown-item">
        <span class="number" id="seconds">00</span>
        <span class="label">Δευτερόλεπτα</span>
      </div>
    </div>

    <footer>
      © 2026 Θαλασσινή Παρέα
    </footer>
  </div>

  <script>
    // Target: 10 days, 11 hours, 30 minutes from April 5, 2026 00:00:00 UTC
    const targetDate = new Date('2026-04-15T11:30:00Z').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>

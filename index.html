<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Θαλασσινή Παρέα</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #0a2540, #1e6091);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      font-weight: 300;
      opacity: 0.9;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .wave {
      font-size: 2.5rem;
      margin-bottom: 20px;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .email-box {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    input[type="email"] {
      padding: 10px;
      border-radius: 25px;
      border: none;
      width: 60%;
    }

    button {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background-color: #00b4d8;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0077b6;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wave">⚓ 🌊 🚢</div>
    <h1>Θαλασσινή Παρέα</h1>
    <h2>Έρχεται Σύντομα</h2>
    <p>Το απόλυτο portal για λάτρεις πλοίων και θαλασσών ετοιμάζεται να σαλπάρει. Μπες στην παρέα και μείνε συντονισμένος!</p>

<footer>
      © 2026 Θαλασσινή Παρέα
    </footer>
  </div>
</body>
</html>
